<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
    font-size: 14px;
    padding: 16px;
    line-height: 1.5;
  }
  pre { white-space: pre-wrap; word-wrap: break-word; }
</style>
</head>
<body>
<pre id="output">Loading...</pre>
<script>
// ANSI escape code → HTML span converter
const ANSI_COLORS = {
  '30': '#1a1a2e', '31': '#ff1744', '32': '#00e676', '33': '#ffea00',
  '34': '#448aff', '35': '#d500f9', '36': '#00e5ff', '37': '#e0e0e0',
  '90': '#9e9e9e', '91': '#ff1744', '92': '#00e676', '93': '#ffea00',
  '94': '#448aff', '95': '#d500f9', '96': '#00e5ff', '97': '#ffffff',
};

function ansiToHtml(text) {
  let html = '';
  let i = 0;
  let openSpans = 0;
  while (i < text.length) {
    if (text[i] === '\x1b' && text[i + 1] === '[') {
      const end = text.indexOf('m', i + 2);
      if (end === -1) { html += text[i]; i++; continue; }
      const codes = text.slice(i + 2, end).split(';');
      i = end + 1;
      let styles = [];
      for (const code of codes) {
        if (code === '0' || code === '') {
          while (openSpans > 0) { html += '</span>'; openSpans--; }
        } else if (code === '1') {
          styles.push('font-weight:bold');
        } else if (code === '2') {
          styles.push('opacity:0.6');
        } else if (ANSI_COLORS[code]) {
          styles.push('color:' + ANSI_COLORS[code]);
        }
      }
      if (styles.length > 0) {
        html += '<span style="' + styles.join(';') + '">';
        openSpans++;
      }
    } else if (text[i] === '<') {
      html += '&lt;'; i++;
    } else if (text[i] === '>') {
      html += '&gt;'; i++;
    } else if (text[i] === '&') {
      html += '&amp;'; i++;
    } else {
      html += text[i]; i++;
    }
  }
  while (openSpans > 0) { html += '</span>'; openSpans--; }
  return html;
}

// MCP App postMessage protocol - receive tool result
window.addEventListener('message', (event) => {
  const msg = event.data;
  if (!msg || !msg.jsonrpc) return;

  // Respond to initialize
  if (msg.method === 'ui/initialize') {
    window.parent.postMessage({
      jsonrpc: '2.0', id: msg.id,
      result: { protocolVersion: '2026-06-17', capabilities: {} }
    }, '*');
    return;
  }

  // Handle tool result
  if (msg.method === 'ui/toolResult') {
    const content = msg.params?.result?.content;
    if (content) {
      const textItem = content.find(c => c.type === 'text');
      if (textItem) {
        document.getElementById('output').innerHTML = ansiToHtml(textItem.text);
      }
    }
    // Acknowledge
    if (msg.id) {
      window.parent.postMessage({
        jsonrpc: '2.0', id: msg.id, result: {}
      }, '*');
    }
    return;
  }

  // Default response for unknown methods with id
  if (msg.id) {
    window.parent.postMessage({
      jsonrpc: '2.0', id: msg.id, result: {}
    }, '*');
  }
});
</script>
</body>
</html>
